<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - SkillShare Hub</title>
    <meta name="description" content="Create your SkillShare Hub account">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="auth-container">

        <div class="auth-card" style="max-width: 500px;">
            <div class="auth-header">
                <a href="index.html" class="skill-link" style="margin-bottom: 1rem; display: inline-block;">← Back to
                    Home</a>
                <div class="logo" style="justify-content: center;">
                    <span class="logo-icon">🎓</span>
                    <span class="logo-text">SkillShare<span class="logo-accent">Hub</span></span>
                </div>
            </div>

            <div style="text-align: center; margin-bottom: 2rem;">
                <h1 class="auth-title">Create Account</h1>
                <p class="auth-subtitle">Join the campus skill-sharing community</p>
            </div>

            <form id="registerForm" class="auth-form">
                <div class="form-row" style="display: flex; gap: 1rem;">
                    <div class="form-group" style="flex: 1;">
                        <label for="firstName" class="form-label">First Name</label>
                        <input type="text" id="firstName" name="firstName" class="form-input" placeholder="John"
                            required>
                    </div>

                    <div class="form-group" style="flex: 1;">
                        <label for="lastName" class="form-label">Last Name</label>
                        <input type="text" id="lastName" name="lastName" class="form-input" placeholder="Doe" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="email" class="form-label">Institutional Email</label>
                    <input type="email" id="email" name="email" class="form-input" placeholder="your.email@college.edu"
                        required>
                </div>

                <div class="form-row" style="display: flex; gap: 1rem;">
                    <div class="form-group" style="flex: 1;">
                        <label for="department" class="form-label">Department</label>
                        <input type="text" id="department" name="department" class="form-input"
                            placeholder="CS, Arts, etc" required>
                    </div>

                    <div class="form-group" style="flex: 1;">
                        <label for="year" class="form-label">Year of Study</label>
                        <input type="text" id="year" name="year" class="form-input" placeholder="1st, 2nd..." required>
                    </div>
                </div>

                <div class="form-row" style="display: flex; gap: 1rem;">
                    <div class="form-group" style="flex: 1;">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" id="password" name="password" class="form-input"
                            placeholder="Create password" required>
                    </div>

                    <div class="form-group" style="flex: 1;">
                        <label for="confirmPassword" class="form-label">Confirm</label>
                        <input type="password" id="confirmPassword" name="confirmPassword" class="form-input"
                            placeholder="Re-enter" required>
                    </div>
                </div>

                <div class="form-group">
                    <label style="display: flex; align-items: center; gap: 0.5rem; font-size: 0.9rem;">
                        <input type="checkbox" name="terms" required>
                        <span>I agree to the Terms of Service and Privacy Policy</span>
                    </label>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%;">
                    Create Account
                </button>

                <div class="divider">Or sign up with</div>

                <div id="google-btn-container">
                    <!-- Google Button Rendered Here -->
                </div>
            </form>

            <div class="auth-footer">
                <p>Already have an account? <a href="login.html">Login</a></p>
            </div>
        </div>
    </div>

    <script src="toast.js"></script>
    <script src="api.js"></script>
    <script src="auth-register.js"></script>
    <script src="auth-google.js"></script>
    <script src="theme.js"></script>
</body>

</html>
