<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages - SkillShare Hub</title>
    <meta name="description" content="Chat with tutors and students on SkillShare Hub">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="messages.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
</head>

<body>
    <!-- Top Navigation Bar -->
    <nav class="dash-topbar">
        <div class="dash-topbar-inner">
            <a href="index.html" class="logo">
                <span class="logo-icon">🎓</span>
                <span class="logo-text">SkillShare<span class="logo-accent">Hub</span></span>
            </a>
            <div class="dash-topbar-right">
                <button id="theme-toggle-btn" class="theme-toggle" aria-label="Toggle theme">🌙</button>
                <div class="dash-user-pill">
                    <div class="dash-user-avatar" id="userAvatarDisplay">U</div>
                    <span class="dash-user-name" id="userNameDisplay">User</span>
                </div>
                <button onclick="API.auth.logout()" class="btn btn-ghost btn-sm" id="logoutBtn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                        <polyline points="16 17 21 12 16 7" />
                        <line x1="21" y1="12" x2="9" y2="12" />
                    </svg>
                    Logout
                </button>
            </div>
        </div>
    </nav>

    <div class="dash-layout">
        <!-- Sidebar -->
        <aside class="dash-sidebar">
            <div class="dash-sidebar-inner">
                <ul class="dash-sidebar-menu">
                    <li class="dash-menu-item">
                        <a href="dashboard.html" class="dash-menu-link">
                            <span class="dash-menu-icon">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="3" y="3" width="7" height="7" />
                                    <rect x="14" y="3" width="7" height="7" />
                                    <rect x="14" y="14" width="7" height="7" />
                                    <rect x="3" y="14" width="7" height="7" />
                                </svg>
                            </span>
                            <span>Overview</span>
                        </a>
                    </li>
                    <li class="dash-menu-item">
                        <a href="dashboard.html#my-skills" class="dash-menu-link">
                            <span class="dash-menu-icon">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <polygon
                                        points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" />
                                </svg>
                            </span>
                            <span>My Skills</span>
                        </a>
                    </li>
                    <li class="dash-menu-item">
                        <a href="profile.html" class="dash-menu-link">
                            <span class="dash-menu-icon">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                                    <circle cx="12" cy="7" r="4" />
                                </svg>
                            </span>
                            <span>My Profile</span>
                        </a>
                    </li>
                    <li class="dash-menu-item">
                        <a href="skills.html" class="dash-menu-link">
                            <span class="dash-menu-icon">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <circle cx="11" cy="11" r="8" />
                                    <line x1="21" y1="21" x2="16.65" y2="16.65" />
                                </svg>
                            </span>
                            <span>Browse Skills</span>
                        </a>
                    </li>
                    <li class="dash-menu-item active">
                        <a href="messages.html" class="dash-menu-link">
                            <span class="dash-menu-icon">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
                                </svg>
                            </span>
                            <span>Messages</span>
                            <span id="sidebarUnreadBadge" class="dash-badge" style="display: none;">0</span>
                        </a>
                    </li>
                    <li class="dash-menu-item">
                        <a href="dashboard.html#sessions" class="dash-menu-link">
                            <span class="dash-menu-icon">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
                                    <line x1="16" y1="2" x2="16" y2="6" />
                                    <line x1="8" y1="2" x2="8" y2="6" />
                                    <line x1="3" y1="10" x2="21" y2="10" />
                                </svg>
                            </span>
                            <span>Sessions</span>
                        </a>
                    </li>
                    <li class="dash-menu-item">
                        <a href="leaderboard.html" class="dash-menu-link">
                            <span class="dash-menu-icon">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5C7 4 7 7 7 7" />
                                    <path d="M18 9h1.5a2.5 2.5 0 0 0 0-5C17 4 17 7 17 7" />
                                    <path d="M4 22h16" />
                                    <path d="M18 2H6v7a6 6 0 0 0 12 0V2Z" />
                                </svg>
                            </span>
                            <span>Leaderboard</span>
                        </a>
                    </li>
                </ul>

                <div class="dash-sidebar-footer">
                    <a href="index.html" class="dash-menu-link">
                        <span class="dash-menu-icon">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                                <polyline points="9 22 9 12 15 12 15 22" />
                            </svg>
                        </span>
                        <span>Back to Home</span>
                    </a>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="dash-main msg-main">
            <div class="msg-container">
                <!-- Conversations Sidebar -->
                <div class="msg-conversations" id="conversationsPanel">
                    <div class="msg-conversations-header">
                        <h2 class="msg-conversations-title">
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
                            </svg>
                            Messages
                        </h2>
                        <span class="msg-total-unread" id="totalUnreadBadge" style="display:none;">0</span>
                    </div>
                    <div class="msg-search-box">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <circle cx="11" cy="11" r="8" />
                            <line x1="21" y1="21" x2="16.65" y2="16.65" />
                        </svg>
                        <input type="text" id="searchConversations" placeholder="Search conversations..."
                            class="msg-search-input" autocomplete="off">
                    </div>
                    <div class="msg-conversations-list" id="conversationsList">
                        <div class="msg-loading">
                            <div class="msg-loading-spinner"></div>
                            <p>Loading conversations...</p>
                        </div>
                    </div>
                </div>

                <!-- Chat Area -->
                <div class="msg-chat" id="chatPanel">
                    <!-- Empty state (no conversation selected) -->
                    <div class="msg-chat-empty" id="chatEmpty">
                        <div class="msg-chat-empty-icon">
                            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
                            </svg>
                        </div>
                        <h3>Your Messages</h3>
                        <p>Select a conversation to start chatting, or send a message from the dashboard sessions.</p>
                    </div>

                    <!-- Chat Header (shown when conversation is active) -->
                    <div class="msg-chat-header" id="chatHeader" style="display:none;">
                        <button class="msg-back-btn" id="backToConversations" aria-label="Back">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <polyline points="15 18 9 12 15 6" />
                            </svg>
                        </button>
                        <div class="msg-chat-user-info">
                            <div class="msg-chat-avatar" id="chatAvatar">U</div>
                            <div class="msg-chat-user-details">
                                <span class="msg-chat-user-name" id="chatUserName">User</span>
                                <span class="msg-chat-skill-label" id="chatSkillLabel"></span>
                            </div>
                        </div>
                        <div class="msg-chat-header-actions">
                            <div class="msg-online-dot"></div>
                        </div>
                    </div>

                    <!-- Messages List -->
                    <div class="msg-chat-messages" id="chatMessages" style="display:none;">
                    </div>

                    <!-- Message Input -->
                    <div class="msg-chat-input-area" id="chatInputArea" style="display:none;">
                        <form id="messageForm" class="msg-chat-form">
                            <div class="msg-input-wrapper">
                                <textarea id="messageInput" class="msg-input" placeholder="Type a message..." rows="1"
                                    maxlength="2000" autocomplete="off"></textarea>
                                <button type="submit" class="msg-send-btn" id="sendBtn" disabled
                                    aria-label="Send message">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <line x1="22" y1="2" x2="11" y2="13" />
                                        <polygon points="22 2 15 22 11 13 2 9 22 2" />
                                    </svg>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="toast.js"></script>
    <script src="api.js"></script>
    <script src="theme.js"></script>
    <script src="messages.js"></script>
</body>

</html>
