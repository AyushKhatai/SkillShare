<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Reviews - SkillShare Hub</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="dashboard.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        .reviews-container {
            max-width: 900px;
            margin: 100px auto;
            padding: var(--spacing-xl);
        }

        .page-header {
            text-align: center;
            margin-bottom: var(--spacing-2xl);
        }

        .page-header h1 {
            font-family: var(--font-display);
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: var(--spacing-sm);
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .review-card {
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--radius-lg);
            padding: var(--spacing-xl);
            margin-bottom: var(--spacing-lg);
            transition: all var(--transition-base);
        }

        .review-card:hover {
            border-color: rgba(102, 126, 234, 0.3);
            transform: translateY(-3px);
        }

        .review-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: var(--spacing-md);
        }

        .reviewer-info {
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
        }

        .reviewer-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--primary-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: white;
            font-size: 1rem;
        }

        .review-stars {
            color: #fbbf24;
            font-size: 1.25rem;
            letter-spacing: 2px;
        }

        .review-skill {
            color: var(--primary-color);
            font-weight: 600;
            margin-bottom: var(--spacing-sm);
        }

        .review-text {
            color: var(--text-secondary);
            line-height: 1.7;
            margin-bottom: var(--spacing-sm);
            font-style: italic;
        }

        .review-date {
            color: var(--text-muted);
            font-size: 0.875rem;
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
        }

        .empty-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        /* Review Form Modal */
        .review-modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .review-modal {
            background: var(--bg-card);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: var(--radius-xl);
            padding: 2rem;
            width: 100%;
            max-width: 480px;
            margin: 1rem;
        }

        .star-rating {
            display: flex;
            gap: 0.5rem;
            margin: 1rem 0;
        }

        .star-rating button {
            background: none;
            border: none;
            font-size: 2rem;
            cursor: pointer;
            color: #d1d5db;
            transition: color 0.15s;
        }

        .star-rating button.active,
        .star-rating button:hover {
            color: #fbbf24;
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <span class="logo-icon">🎓</span>
                <span class="logo-text">SkillShare<span class="logo-accent">Hub</span></span>
            </div>
            <div class="nav-actions">
                <a href="dashboard.html" class="btn btn-ghost">← Back to Dashboard</a>
            </div>
        </div>
    </nav>

    <div class="reviews-container">
        <div class="page-header">
            <h1>My Reviews</h1>
            <p style="color: var(--text-secondary); font-size: 1.1rem;">Feedback from your learning sessions</p>
        </div>

        <div id="reviewsList">
            <div class="empty-state">
                <div class="empty-icon">⏳</div>
                <p>Loading reviews...</p>
            </div>
        </div>
    </div>

    <!-- Review Submit Modal -->
    <div class="review-modal-overlay" id="reviewModal">
        <div class="review-modal">
            <h3 style="margin-bottom:0.5rem;">Leave a Review</h3>
            <p id="reviewSkillName" style="color:var(--primary-color); font-weight:600; margin-bottom:1rem;"></p>
            <div class="star-rating" id="starRating">
                <button type="button" data-val="1" onclick="setRating(1)">★</button>
                <button type="button" data-val="2" onclick="setRating(2)">★</button>
                <button type="button" data-val="3" onclick="setRating(3)">★</button>
                <button type="button" data-val="4" onclick="setRating(4)">★</button>
                <button type="button" data-val="5" onclick="setRating(5)">★</button>
            </div>
            <textarea id="reviewComment" class="form-input" rows="4" placeholder="Share your experience..." style="width:100%; margin-bottom:1rem;"></textarea>
            <div style="display:flex; gap:0.75rem; justify-content:flex-end;">
                <button class="btn btn-ghost" onclick="closeReviewModal()">Cancel</button>
                <button class="btn btn-primary" onclick="submitReview()">Submit Review</button>
            </div>
        </div>
    </div>

    <script src="toast.js"></script>
    <script src="api.js"></script>
    <script src="theme.js"></script>
    <script>
        let selectedRating = 0;
        let currentSkillId = null;

        async function loadReviews() {
            const list = document.getElementById('reviewsList');
            try {
                const data = await API.reviews.getMyReviews();
                const reviews = Array.isArray(data) ? data : (data.reviews || []);

                if (reviews.length === 0) {
                    list.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-icon">💬</div>
                            <p style="font-size:1.1rem; margin-bottom:0.5rem;">No reviews yet</p>
                            <p style="font-size:0.875rem;">Reviews you've written will appear here</p>
                        </div>`;
                    return;
                }

                list.innerHTML = reviews.map(r => {
                    const stars = '⭐'.repeat(r.rating) + '☆'.repeat(5 - r.rating);
                    const initials = (r.full_name || 'U').split(' ').map(n => n[0]).join('').toUpperCase().slice(0,2);
                    const date = r.created_at ? new Date(r.created_at).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' }) : '';
                    return `
                    <div class="review-card">
                        <div class="review-header">
                            <div class="reviewer-info">
                                <div class="reviewer-avatar">${initials}</div>
                                <div>
                                    <h4>${escapeHtml(r.full_name || 'You')}</h4>
                                    <p style="color:var(--text-muted); font-size:0.8rem;">${date}</p>
                                </div>
                            </div>
                            <div class="review-stars">${stars}</div>
                        </div>
                        <div class="review-skill">${escapeHtml(r.skill_title || 'Skill')}</div>
                        ${r.comment ? `<p class="review-text">"${escapeHtml(r.comment)}"</p>` : ''}
                    </div>`;
                }).join('');
            } catch (e) {
                list.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><p>Failed to load reviews. Please login first.</p></div>`;
            }
        }

        function openReviewModal(skillId, skillTitle) {
            currentSkillId = skillId;
            selectedRating = 0;
            document.getElementById('reviewSkillName').textContent = skillTitle;
            document.getElementById('reviewComment').value = '';
            setRating(0);
            document.getElementById('reviewModal').style.display = 'flex';
        }

        function closeReviewModal() {
            document.getElementById('reviewModal').style.display = 'none';
        }

        function setRating(val) {
            selectedRating = val;
            document.querySelectorAll('#starRating button').forEach(btn => {
                btn.classList.toggle('active', parseInt(btn.dataset.val) <= val);
            });
        }

        async function submitReview() {
            if (!selectedRating) { showToast('Please select a star rating', 'error'); return; }
            if (!currentSkillId) return;
            const comment = document.getElementById('reviewComment').value.trim();
            try {
                await API.reviews.createReview({ skill_id: currentSkillId, rating: selectedRating, comment });
                showToast('Review submitted! ⭐', 'success');
                closeReviewModal();
                loadReviews();
            } catch (e) {
                showToast('Failed: ' + e.message, 'error');
            }
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        loadReviews();

        // Auto-open modal if coming from dashboard Review button
        const params = new URLSearchParams(window.location.search);
        if (params.get('skill_id')) {
            openReviewModal(parseInt(params.get('skill_id')), decodeURIComponent(params.get('skill_title') || 'Skill'));
        }
    </script>
</body>

</html>
